<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#08070c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>InnocenZ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Marcellus&family=Outfit:wght@300;400;500;600;700&display=swap');

html, body{ height:100%; overflow:hidden; -webkit-text-size-adjust:100%; }
body{ margin:0; background:#050409; }

#iz-root, #iz-root * { box-sizing:border-box; margin:0; padding:0; }
#iz-root button, #iz-root input{ -webkit-tap-highlight-color:transparent; touch-action:manipulation; }

#iz-root{
  --bg:#08070c; --panel:#100e16; --line:rgba(201,168,106,.18);
  --gold:#cdab68; --gold-bright:#ecd9a4; --violet:#a855f7; --violet-deep:#7c3aed;
  --txt:#f3eee4; --txt-dim:#9890a8; --txt-faint:#5f586e;
  --green:#4ade80; --red:#f43f5e;
  --serif:'Cormorant Garamond',Georgia,serif; --display:'Marcellus',serif; --sans:'Outfit',sans-serif;
  --safe-top:env(safe-area-inset-top, 0px); --safe-right:env(safe-area-inset-right, 0px);
  --safe-bottom:env(safe-area-inset-bottom, 0px); --safe-left:env(safe-area-inset-left, 0px);
  font-family:var(--sans);
  display:flex; flex-direction:column; align-items:stretch;
  width:100%; height:100dvh; min-height:100dvh; max-height:100dvh;
  gap:0; padding:0; color:var(--txt); overflow:hidden;
  background:var(--bg);
}

#iz-root .iz-head,
#iz-root .legend,
#iz-root .nav-hint{ display:none; }

#iz-root .iz-head{ text-align:center; max-width:880px; }
#iz-root .iz-head h1{ font-family:var(--display); font-size:30px; letter-spacing:2px; font-weight:400;
  background:linear-gradient(120deg,#ecd9a4,#cdab68 45%,#9a7b3e 75%,#ecd9a4);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
#iz-root .iz-head p{ color:var(--txt-dim); font-size:13px; margin-top:6px; font-weight:300; letter-spacing:.3px; }
#iz-root .iz-head .tip{ margin-top:14px; display:inline-flex; gap:8px; align-items:center; font-size:11.5px;
  color:var(--gold); background:rgba(201,168,106,.08); border:1px solid var(--line); padding:7px 14px; border-radius:30px; }

/* app shell */
#iz-root .phone{ position:relative; flex:1; width:100%; min-height:0; height:auto;
  border-radius:0; padding:0; background:var(--bg); box-shadow:none; }
#iz-root .screen{ position:relative; width:100%; height:100%; border-radius:0; overflow:hidden;
  background:var(--bg); display:flex; flex-direction:column; min-height:0; }
#iz-root .notch{ display:none; }
/* ambient glow sits BEHIND everything */
#iz-root .screen::before{ content:''; position:absolute; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(420px 300px at 85% 6%, rgba(124,58,237,.26), transparent 60%),
    radial-gradient(360px 260px at 0% 92%, rgba(201,168,106,.13), transparent 60%); }
/* EVERY direct child of screen sits ABOVE the glow */
#iz-root .screen > *{ position:relative; z-index:1; }

#iz-root .statusbar{ display:none; }

/* layout */
#iz-root .view{ display:flex; flex-direction:column; flex:1; min-height:0; animation:fade .32s ease; }
@keyframes fade{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }
#iz-root .scroll{ flex:1; overflow-y:auto; overflow-x:hidden;
  padding:max(8px,var(--safe-top)) max(18px,var(--safe-right)) calc(20px + var(--safe-bottom)) max(18px,var(--safe-left));
  -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }
#iz-root .view > .topbar + .scroll{ padding-top:6px; }
#iz-root .scroll::-webkit-scrollbar{ width:0; }
#iz-root .center{ display:flex; flex-direction:column; justify-content:center; }

/* type */
#iz-root .logo{ font-family:var(--display); letter-spacing:1.5px; font-size:22px;
  background:linear-gradient(120deg,#ecd9a4,#cdab68 50%,#a9854a);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
#iz-root .eyebrow{ font-size:10.5px; letter-spacing:3px; text-transform:uppercase; color:var(--violet); font-weight:600; }
#iz-root .h2{ font-family:var(--serif); font-size:30px; font-weight:600; line-height:1.05; }
#iz-root .h3{ font-family:var(--serif); font-size:22px; font-weight:600; }
#iz-root .muted{ color:var(--txt-dim); font-size:13px; font-weight:300; line-height:1.5; }
#iz-root .faint{ color:var(--txt-faint); font-size:11px; }
#iz-root .gold{ color:var(--gold-bright); }

/* cards */
#iz-root .card{ background:linear-gradient(160deg,rgba(28,24,38,.92),rgba(16,14,22,.94));
  border:1px solid var(--line); border-radius:20px; padding:16px; }
#iz-root .card.neon{ box-shadow:0 18px 40px -22px rgba(124,58,237,.7); position:relative; }
#iz-root .card.neon::after{ content:''; position:absolute; left:18px; right:18px; bottom:-1px; height:2px;
  border-radius:2px; background:linear-gradient(90deg,transparent,var(--violet),transparent); opacity:.9; }

/* buttons */
#iz-root .btn{ display:flex; align-items:center; justify-content:center; gap:9px; width:100%; padding:15px;
  border:none; border-radius:16px; cursor:pointer; font-family:var(--sans); font-size:15px; font-weight:600;
  letter-spacing:.3px; transition:transform .15s ease; }
#iz-root .btn:active{ transform:scale(.97); }
#iz-root .btn-violet{ color:#fff; background:linear-gradient(120deg,#a855f7,#7c3aed); box-shadow:0 14px 34px -12px rgba(124,58,237,.9); }
#iz-root .btn-gold{ color:#1a1206; background:linear-gradient(120deg,#ecd9a4,#cdab68); box-shadow:0 14px 30px -14px rgba(201,168,106,.8); }
#iz-root .btn-ghost{ background:rgba(255,255,255,.04); border:1px solid var(--line); color:var(--txt); }
#iz-root .btn-danger{ color:#fff; background:linear-gradient(120deg,#fb7185,#e11d48); box-shadow:0 14px 34px -12px rgba(225,29,72,.8); }
#iz-root .btn-sm{ padding:9px 16px; font-size:12.5px; border-radius:11px; width:auto; }

/* roles */
#iz-root .role-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
#iz-root .role{ position:relative; border:1px solid var(--line); border-radius:18px; padding:15px;
  background:linear-gradient(160deg,rgba(26,22,36,.75),rgba(13,11,18,.9)); cursor:pointer; transition:all .2s ease; }
#iz-root .role:hover{ border-color:rgba(168,85,247,.6); transform:translateY(-2px); }
#iz-root .role.sel{ border-color:var(--violet); box-shadow:0 0 0 1px var(--violet),0 16px 36px -18px rgba(124,58,237,.9); }
#iz-root .role .ico{ font-size:22px; }
#iz-root .role .rname{ font-weight:600; font-size:15px; margin-top:10px; }
#iz-root .role .rdesc{ font-size:11px; color:var(--txt-dim); margin-top:3px; line-height:1.45; font-weight:300; }
#iz-root .role .arrow{ position:absolute; top:14px; right:14px; width:26px; height:26px; border-radius:50%;
  border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--txt-dim); }
#iz-root .role.role-center{ grid-column:1 / -1; justify-self:center; width:calc((100% - 12px) / 2); }

/* shift */
#iz-root .shift{ margin-bottom:13px; }
#iz-root .row{ display:flex; justify-content:space-between; align-items:flex-start; }
#iz-root .venue{ font-family:var(--serif); font-size:20px; font-weight:600; }
#iz-root .loc{ font-size:11.5px; color:var(--txt-dim); margin-top:1px; }
#iz-root .rate{ font-family:var(--serif); font-size:21px; font-weight:700; color:var(--gold-bright); }
#iz-root .time{ font-size:12px; color:var(--txt-dim); margin-top:9px; display:flex; gap:8px; align-items:center; }
#iz-root .badge{ font-size:9.5px; font-weight:700; letter-spacing:.6px; padding:4px 9px; border-radius:20px; text-transform:uppercase; }
#iz-root .badge.vip{ background:linear-gradient(120deg,#a855f7,#7c3aed); color:#fff; }
#iz-root .badge.star{ background:rgba(201,168,106,.15); color:var(--gold-bright); border:1px solid var(--line); }

/* segmented */
#iz-root .seg{ display:flex; gap:6px; background:rgba(255,255,255,.04); padding:5px; border-radius:14px; margin:4px 0 16px; }
#iz-root .seg button{ flex:1; border:none; background:transparent; color:var(--txt-dim); padding:8px; border-radius:10px;
  font-family:var(--sans); font-size:12.5px; font-weight:500; cursor:pointer; transition:.2s; }
#iz-root .seg button.on{ background:linear-gradient(120deg,#ecd9a4,#cdab68); color:#1a1206; font-weight:600; }

/* ring */
#iz-root .ring-wrap{ display:flex; flex-direction:column; align-items:center; padding:18px 0 6px; }
#iz-root .ring{ width:200px; height:200px; border-radius:50%; display:flex; flex-direction:column; align-items:center;
  justify-content:center; cursor:pointer; background:radial-gradient(circle at 50% 50%, rgba(201,168,106,.08), transparent 70%);
  border:2px solid rgba(201,168,106,.3); transition:.4s; }
#iz-root .ring.done{ border-color:var(--gold); box-shadow:0 0 0 6px rgba(201,168,106,.07),0 0 50px rgba(201,168,106,.4); }
#iz-root .ring .ico{ font-size:34px; }
#iz-root .ring .lbl{ font-family:var(--serif); font-size:24px; font-weight:600; margin-top:6px; }
#iz-root .ring .sub{ font-size:11px; color:var(--txt-dim); margin-top:2px; letter-spacing:1px; text-transform:uppercase; }

/* tiles */
#iz-root .tiles{ display:grid; grid-template-columns:1fr 1fr; gap:11px; }
#iz-root .tile{ background:rgba(255,255,255,.03); border:1px solid var(--line); border-radius:16px; padding:14px; }
#iz-root .tile .t-lbl{ font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--txt-faint); }
#iz-root .tile .t-val{ font-family:var(--serif); font-size:26px; font-weight:700; margin-top:5px; }

/* line items */
#iz-root .li{ display:flex; justify-content:space-between; padding:11px 0; border-bottom:1px dashed rgba(255,255,255,.07); font-size:13.5px; }
#iz-root .li:last-child{ border-bottom:none; }
#iz-root .li .k{ color:var(--txt-dim); }
#iz-root .li .v{ font-weight:600; color:var(--txt); }
#iz-root .li.total .k, #iz-root .li.total .v{ font-family:var(--serif); font-size:18px; color:var(--gold-bright); font-weight:700; }

/* nav */
#iz-root .tabbar{ display:flex; justify-content:space-around; align-items:center; flex:none;
  padding:10px max(14px,var(--safe-right)) max(12px,calc(10px + var(--safe-bottom))) max(14px,var(--safe-left));
  background:linear-gradient(0deg,rgba(8,7,12,1),rgba(8,7,12,.6)); border-top:1px solid var(--line); }
#iz-root .tab{ display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; color:var(--txt-faint);
  font-size:9.5px; letter-spacing:.5px; transition:.2s; background:none; border:none; font-family:var(--sans); }
#iz-root .tab .tico{ font-size:19px; }
#iz-root .tab.on{ color:var(--gold-bright); }
#iz-root .tab.sos .tico{ width:46px; height:46px; margin-top:-26px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; background:linear-gradient(120deg,#a855f7,#7c3aed); box-shadow:0 0 24px rgba(124,58,237,.8);
  font-size:14px; font-weight:700; color:#fff; border:3px solid var(--bg); }

/* topbar / misc */
#iz-root .topbar{ display:flex; align-items:center; justify-content:space-between; flex:none;
  padding:max(10px,var(--safe-top)) max(18px,var(--safe-right)) 10px max(18px,var(--safe-left)); }
#iz-root .av{ width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,#a855f7,#cdab68);
  display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; color:#0a0a0a; cursor:pointer; }
#iz-root .bell{ width:36px; height:36px; border-radius:50%; border:1px solid var(--line); display:flex; align-items:center;
  justify-content:center; position:relative; }
#iz-root .bell::after{ content:''; position:absolute; top:9px; right:10px; width:6px; height:6px; border-radius:50%; background:var(--violet); }
#iz-root .back{ background:none; border:1px solid var(--line); color:var(--txt); width:36px; height:36px; border-radius:50%; cursor:pointer; font-size:15px; }
#iz-root .pill{ display:inline-flex; align-items:center; gap:6px; font-size:11px; padding:5px 11px; border-radius:20px;
  background:rgba(255,255,255,.04); border:1px solid var(--line); color:var(--txt-dim); }
#iz-root .live-dot{ width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 1.4s infinite; }
@keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.3} }
#iz-root .input{ width:100%; background:rgba(255,255,255,.04); border:1px solid var(--line); border-radius:13px; padding:14px;
  color:var(--txt); font-family:var(--sans); font-size:14px; margin-bottom:11px; }
#iz-root .input::placeholder{ color:var(--txt-faint); }
#iz-root .divider{ display:flex; align-items:center; gap:12px; color:var(--txt-faint); font-size:11px; margin:16px 0; }
#iz-root .divider::before, #iz-root .divider::after{ content:''; flex:1; height:1px; background:var(--line); }
#iz-root .prof-pic{ width:84px; height:84px; border-radius:50%; background:linear-gradient(135deg,#a855f7,#cdab68);
  margin:0 auto; display:flex; align-items:center; justify-content:center; font-family:var(--serif); font-size:34px; color:#0a0a0a; font-weight:700; }
#iz-root .star-row{ color:var(--gold-bright); letter-spacing:3px; font-size:15px; }
#iz-root .toast{ position:absolute; left:max(18px,var(--safe-left)); right:max(18px,var(--safe-right));
  bottom:calc(88px + var(--safe-bottom)); background:linear-gradient(120deg,#1c1826,#100e16);
  border:1px solid var(--line); border-radius:14px; padding:14px 16px; z-index:80; display:flex; gap:11px; align-items:center;
  box-shadow:0 16px 40px -16px rgba(0,0,0,.9); opacity:0; transform:translateY(20px); transition:.35s; pointer-events:none; }
#iz-root .toast.show{ opacity:1; transform:none; }
#iz-root .toast .ti{ width:30px; height:30px; border-radius:50%; background:rgba(74,222,128,.15); color:var(--green);
  display:flex; align-items:center; justify-content:center; flex:none; }
#iz-root .map-mock{ height:150px; border-radius:16px; position:relative; overflow:hidden; border:1px solid var(--line);
  background:linear-gradient(rgba(124,58,237,.08),rgba(124,58,237,.08)),
    repeating-linear-gradient(0deg,#0e0c14,#0e0c14 22px,#13111b 22px,#13111b 23px),
    repeating-linear-gradient(90deg,#0e0c14,#0e0c14 22px,#13111b 22px,#13111b 23px); }
#iz-root .map-pin{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:18px; height:18px; border-radius:50%;
  background:var(--violet); box-shadow:0 0 0 8px rgba(124,58,237,.25),0 0 0 18px rgba(124,58,237,.12); }
#iz-root .legend{ display:flex; flex-wrap:wrap; gap:14px; justify-content:center; max-width:880px; font-size:11.5px; color:var(--txt-dim); }
#iz-root .legend span{ display:inline-flex; gap:6px; align-items:center; }
#iz-root .legend i{ width:18px; height:10px; border-radius:3px; display:inline-block; }
#iz-root .nav-hint{ font-size:11px; color:var(--txt-faint); text-align:center; margin-top:4px; }

/* small phones */
@media (max-width:380px){
  #iz-root .h2{ font-size:26px; }
  #iz-root .role{ padding:13px; }
  #iz-root .role .rname{ font-size:14px; }
  #iz-root .seg button{ font-size:11px; padding:7px 4px; }
  #iz-root .ring{ width:170px; height:170px; }
}

/* desktop: prototype presentation frame */
@media (min-width:900px){
  html, body{ overflow:auto; height:auto; }
  #iz-root{
    align-items:center; gap:18px; width:auto; height:auto; min-height:100vh; max-height:none;
    padding:30px 12px 50px; overflow:visible;
    background:
      radial-gradient(900px 500px at 80% -5%, rgba(124,58,237,.22), transparent 60%),
      radial-gradient(700px 500px at 10% 110%, rgba(201,168,106,.12), transparent 55%),
      #050409;
  }
  #iz-root .iz-head,
  #iz-root .legend{ display:block; }
  #iz-root .nav-hint{ display:block; }
  #iz-root .legend{ display:flex; }
  #iz-root .phone{
    flex:none; width:390px; height:820px; border-radius:54px;
    background:linear-gradient(160deg,#22202c,#0c0b12); padding:13px;
    box-shadow:0 0 0 2px rgba(201,168,106,.25),0 40px 90px -20px rgba(0,0,0,.9),0 0 120px -30px rgba(124,58,237,.5);
  }
  #iz-root .screen{ border-radius:42px; }
  #iz-root .notch{ display:block; position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:130px; height:26px; background:#000; border-radius:0 0 18px 18px; z-index:60; }
  #iz-root .statusbar{ display:flex; justify-content:space-between; align-items:center;
    padding:13px 26px 6px; font-size:12px; color:var(--txt); font-weight:500; }
  #iz-root .statusbar .dots{ letter-spacing:1px; opacity:.85; }
  #iz-root .scroll{ padding:6px 22px 26px; }
  #iz-root .topbar{ padding:4px 22px 10px; }
  #iz-root .tabbar{ padding:12px 14px 22px; }
  #iz-root .toast{ left:22px; right:22px; bottom:96px; }
}
</style>
</head>
<body>
<div id="iz-root"></div>
<script>
(function(){
  var root = document.getElementById('iz-root');

  root.innerHTML =
    '<div class="iz-head">' +
      '<h1>InnocenZ — Mobile Prototype</h1>' +
      '<p>PR Personnel app · clickable UI/UX wired to the MVP flows</p>' +
      '<div class="tip">✦ Tap cards, buttons &amp; the bottom nav to move through the journey</div>' +
    '</div>' +
    '<div class="phone"><div class="notch"></div><div class="screen" id="iz-screen"></div></div>' +
    '<div class="legend">' +
      '<span><i style="background:linear-gradient(120deg,#a855f7,#7c3aed)"></i> Primary action</span>' +
      '<span><i style="background:linear-gradient(120deg,#ecd9a4,#cdab68)"></i> Confirm / money</span>' +
      '<span><i style="background:rgba(255,255,255,.12)"></i> Secondary</span>' +
      '<span><i style="background:linear-gradient(120deg,#fb7185,#e11d48)"></i> Emergency</span>' +
    '</div>' +
    '<div class="nav-hint">Welcome → Sign In → Shifts → Detail → Check-In → Wallet → Sign PV → SOS → Profile</div>';

  var screenEl = document.getElementById('iz-screen');

  /* ---------- navigation ---------- */
  window.izGo = function(name){
    var fn = views[name] || views.welcome;
    var html;
    try { html = statusBar() + '<div class="view">' + fn() + '</div>'; }
    catch(e){ html = statusBar() + '<div class="view"><div class="scroll"><div class="card" style="margin-top:40px">'
      + '<div class="eyebrow" style="color:#f43f5e">RENDER ERROR</div><div class="muted" style="margin-top:8px">'
      + String(e) + '</div></div></div></div>'; }
    screenEl.innerHTML = html;
    bind(name);
    var sc = screenEl.querySelector('.scroll'); if(sc) sc.scrollTop = 0;
  };

  window.izToast = function(msg){
    var t = document.createElement('div');
    t.className = 'toast';
    t.innerHTML = '<div class="ti">✓</div><div style="font-size:13px">' + msg + '</div>';
    screenEl.appendChild(t);
    requestAnimationFrame(function(){ t.classList.add('show'); });
    setTimeout(function(){ t.classList.remove('show'); setTimeout(function(){ t.remove(); }, 400); }, 2200);
  };

  function bind(name){
    if(name === 'welcome'){
      var roles = screenEl.querySelectorAll('.role');
      roles.forEach(function(r){
        r.onclick = function(){
          roles.forEach(function(x){ x.classList.remove('sel'); });
          r.classList.add('sel');
        };
      });
    }
    if(name === 'shift'){
      var ring = screenEl.querySelector('#checkRing');
      if(ring){
        ring.onclick = function(){
          ring.classList.add('done');
          ring.querySelector('.ico').textContent = '✓';
          ring.querySelector('.lbl').textContent = 'Velvet 23';
          ring.querySelector('.sub').textContent = 'Checked in · 23:47';
          var ls = screenEl.querySelector('#liveStats'); if(ls) ls.style.display = 'grid';
          izToast('Geo check-in confirmed — within 50m');
        };
      }
    }
  }

  /* ---------- shared bits ---------- */
  function statusBar(){
    return '<div class="statusbar"><span>9:41</span><span class="dots">●●● ✦ ▮</span></div>';
  }
  function tab(id, ico, lbl, scr, active){
    return '<button class="tab ' + (active===id?'on':'') + '" onclick="izGo(\'' + scr + '\')">' +
           '<span class="tico">' + ico + '</span>' + lbl + '</button>';
  }
  function tabbar(active){
    return '<div class="tabbar">' +
      tab('home','⌂','Home','home',active) +
      tab('shift','◈','Shift','shift',active) +
      '<button class="tab sos" onclick="izGo(\'sos\')"><span class="tico">SOS</span>Safety</button>' +
      tab('wallet','◇','Wallet','wallet',active) +
      tab('profile','◐','Profile','profile',active) +
    '</div>';
  }

  /* ---------- views ---------- */
  var views = {
    welcome: function(){
      return '<div class="scroll center" style="text-align:center;padding-top:24px;">' +
        '<div style="font-family:var(--display);font-size:46px;letter-spacing:3px;' +
          'background:linear-gradient(120deg,#a855f7,#ecd9a4,#cdab68);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">Z</div>' +
        '<div class="logo" style="font-size:30px;margin-top:2px;">InnocenZ</div>' +
